<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cronograma Diário</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      text-align: center;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
    }

    .container {
      padding: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    iframe {
      width: 90%;
      height: 600px;
      border: none;
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<header>
  <h1>Meu Cronograma</h1>
</header>

<div class="container">

  <h2>Atualizar PDF</h2>
  <input type="file" id="pdfInput" accept="application/pdf">

  <iframe id="pdfViewer"></iframe>

</div>

<script>
  // Mostrar PDF
  document.getElementById('pdfInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const url = URL.createObjectURL(file);
      document.getElementById('pdfViewer').src = url;
    }
  });
</script>

</body>
</html>
