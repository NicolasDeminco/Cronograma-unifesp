<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sequência de Imagens</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #111;
      color: #fff;
    }

    .container {
      text-align: center;
    }

    img {
      width: 500px;
      height: 300px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="container">
    <img id="imagem" src="https://picsum.photos/id/1015/500/300">
    <br>
    <button onclick="proximaImagem()">Próxima</button>
  </div>

  <script>
    const imagens = [
      "https://picsum.photos/id/1015/500/300",
      "https://picsum.photos/id/1025/500/300",
      "https://picsum.photos/id/1035/500/300",
      "https://picsum.photos/id/1045/500/300"
    ];

    let index = 0;

    function proximaImagem() {
      index = (index + 1) % imagens.length;
      document.getElementById("imagem").src = imagens[index];
    }
  </script>

</body>
</html>
