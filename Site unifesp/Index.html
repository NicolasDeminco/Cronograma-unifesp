<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cronograma Diário</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      text-align: center;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
    }

    .container {
      padding: 20px;
    }

    iframe {
      width: 90%;
      height: 600px;
      border: none;
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 15px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>
  <h1>Meu Cronograma</h1>
</header>

<div class="container">

  <h2>Cronograma Atual</h2>

  <!-- PDF fixo no site -->
  <iframe src="cronograma.pdf"></iframe>

  <!-- Botão para baixar -->
  <br>
  <a href="cronograma.pdf" class="btn" download>Baixar PDF</a>

</div>

</body>
</html>
